<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – StudyPlan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0f172a;font-family:'Poppins',sans-serif;padding:20px;}
    .auth-wrap{width:100%;max-width:400px;}
    .auth-card{background:#1e293b;padding:42px 38px;border-radius:16px;border:1px solid #334155;}
    .auth-card h2{color:#fff;text-align:center;font-weight:700;margin-bottom:6px;font-size:1.5rem;}
    .auth-subtitle{color:#94a3b8;text-align:center;font-size:.85rem;margin-bottom:28px;}
    .auth-input{width:100%;margin:8px 0;padding:12px 16px;background:#0f172a;border:1.5px solid #334155;border-radius:10px;color:#fff;font-size:.9rem;font-family:'Poppins',sans-serif;transition:border-color .2s;box-sizing:border-box;}
    .auth-input:focus{outline:none;border-color:#4a90d9;}
    .auth-input::placeholder{color:#475569;}
    .auth-btn{width:100%;padding:12px;background:linear-gradient(135deg,#4a90d9,#7b61ff);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:12px;transition:opacity .2s,transform .2s;font-family:'Poppins',sans-serif;}
    .auth-btn:hover{opacity:.9;transform:translateY(-1px);}
    .auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .auth-link{color:#94a3b8;text-align:center;margin-top:18px;font-size:.85rem;}
    .auth-link a{color:#4a90d9;text-decoration:none;font-weight:600;}
    .auth-link a:hover{text-decoration:underline;}
    .back-home{display:flex;align-items:center;gap:6px;color:#64748b;text-decoration:none;font-size:.82rem;margin-bottom:16px;transition:color .2s;}
    .back-home:hover{color:#94a3b8;}
    .alert-box{padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px;display:none;}
    .alert-box.show{display:block;}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
    .field-label{color:#94a3b8;font-size:.78rem;margin:8px 0 2px 2px;display:block;}
  </style>
</head>
<body>
<div class="auth-wrap">
  <a href="index.html" class="back-home">← Back to Home</a>
  <div class="auth-card">
    <h2>Welcome Back </h2>
    <p class="auth-subtitle">Login to access your study planner</p>
    <div class="alert-box alert-error" id="errorAlert"></div>
    <label class="field-label">Username</label>
    <input type="text"     id="username" class="auth-input" placeholder="Your username" autocomplete="username" />
    <label class="field-label">Password</label>
    <input type="password" id="password" class="auth-input" placeholder="Your password" autocomplete="current-password" />
    <button class="auth-btn" id="loginBtn" onclick="login()">Login →</button>
    <p class="auth-link">No account? <a href="signup.html">Sign Up here</a></p>
  </div>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('errorAlert');

  errEl.classList.remove('show');

  if (!username || !password) { showError('Please enter both username and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res  = await fetch('auth/login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('isLoggedIn',   'true');
      localStorage.setItem('loggedInUser', JSON.stringify(data.user));
      window.location.href = 'planner.html';
    } else {
      showError(data.message || 'Login failed. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Login →';
    }
  } catch(e) {
    showError('Could not connect to server. Make sure XAMPP is running.');
    btn.disabled = false;
    btn.textContent = 'Login →';
  }
}

function showError(msg) {
  const el = document.getElementById('errorAlert');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}

document.addEventListener('DOMContentLoaded', () => {
  ['username','password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') login(); });
  });
});
</script>
</body>
</html>
