<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – StudyPlan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0f172a;font-family:'Poppins',sans-serif;padding:20px;}
    .auth-wrap{width:100%;max-width:400px;}
    .auth-card{background:#1e293b;padding:42px 38px;border-radius:16px;border:1px solid #334155;}
    .auth-card h2{color:#fff;text-align:center;font-weight:700;margin-bottom:6px;font-size:1.5rem;}
    .auth-subtitle{color:#94a3b8;text-align:center;font-size:.85rem;margin-bottom:28px;}
    .auth-input{width:100%;margin:4px 0;padding:12px 16px;background:#0f172a;border:1.5px solid #334155;border-radius:10px;color:#fff;font-size:.9rem;font-family:'Poppins',sans-serif;transition:border-color .2s;box-sizing:border-box;}
    .auth-input:focus{outline:none;border-color:#4a90d9;}
    .auth-input::placeholder{color:#475569;}
    .auth-btn{width:100%;padding:12px;background:linear-gradient(135deg,#4a90d9,#7b61ff);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:12px;transition:opacity .2s,transform .2s;font-family:'Poppins',sans-serif;}
    .auth-btn:hover{opacity:.9;transform:translateY(-1px);}
    .auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .auth-link{color:#94a3b8;text-align:center;margin-top:18px;font-size:.85rem;}
    .auth-link a{color:#4a90d9;text-decoration:none;font-weight:600;}
    .auth-link a:hover{text-decoration:underline;}
    .back-home{display:flex;align-items:center;gap:6px;color:#64748b;text-decoration:none;font-size:.82rem;margin-bottom:16px;transition:color .2s;}
    .back-home:hover{color:#94a3b8;}
    .alert-box{padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px;display:none;}
    .alert-box.show{display:block;}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
    .alert-success{background:rgba(92,184,92,.1);border:1px solid rgba(92,184,92,.3);color:#86efac;}
    .field-label{color:#94a3b8;font-size:.78rem;margin:10px 0 2px 2px;display:block;}
    .divider{border-top:1px solid #334155;margin:16px 0;}
  </style>
</head>
<body>
<div class="auth-wrap">
  <a href="index.html" class="back-home">← Back to Home</a>
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join StudyPlan and start planning smarter</p>
    <div class="alert-box alert-error"   id="errorAlert"></div>
    <div class="alert-box alert-success" id="successAlert"></div>
    <label class="field-label">Full Name *</label>
    <input type="text"   id="name"     class="auth-input" placeholder="e.g. Kavindu Kumarasinghe" autocomplete="name" />
    <label class="field-label">School / University *</label>
    <input type="text"   id="edu"      class="auth-input" placeholder="e.g. Rajarata University" />
    <label class="field-label">Age *</label>
    <input type="number" id="age"      class="auth-input" placeholder="e.g. 21" min="10" max="100" />
    <div class="divider"></div>
    <label class="field-label">Username *</label>
    <input type="text"     id="username" class="auth-input" placeholder="Choose a username" autocomplete="username" />
    <label class="field-label">Password *</label>
    <input type="password" id="password" class="auth-input" placeholder="At least 6 characters" autocomplete="new-password" />
    <button class="auth-btn" id="signupBtn" onclick="signup()">Create Account →</button>
    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
  </div>
</div>
<script>
async function signup() {
  const name     = document.getElementById('name').value.trim();
  const edu      = document.getElementById('edu').value.trim();
  const age      = document.getElementById('age').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('signupBtn');

  document.getElementById('errorAlert').classList.remove('show');
  document.getElementById('successAlert').classList.remove('show');

  if (!name||!edu||!age||!username||!password){ showError('Please fill in all fields.'); return; }
  if (username.length < 3) { showError('Username must be at least 3 characters.'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
  if (isNaN(age)||parseInt(age)<10||parseInt(age)>100){ showError('Please enter a valid age (10–100).'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res  = await fetch('auth/register.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, edu, age: parseInt(age), username, password })
    });
    const data = await res.json();

    if (data.success) {
      // ── LOG IN IMMEDIATELY after signup ──
      localStorage.setItem('isLoggedIn',   'true');
      localStorage.setItem('loggedInUser', JSON.stringify(data.user));

      const el = document.getElementById('successAlert');
      el.textContent = '✅ Account created! Taking you to your planner...';
      el.classList.add('show');

      setTimeout(() => { window.location.href = 'planner.html'; }, 1200);
    } else {
      showError(data.message || 'Signup failed. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    }
  } catch(e) {
    showError('Could not connect to server. Make sure XAMPP is running.');
    btn.disabled = false;
    btn.textContent = 'Create Account →';
  }
}

function showError(msg) {
  const el = document.getElementById('errorAlert');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}

document.addEventListener('DOMContentLoaded', () => {
  ['name','edu','age','username','password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') signup(); });
  });
});
</script>
</body>
</html>
